chakra:
  today: Today
  reset: Back to today
  element: Element
  affirmation: Affirmation

  crown:
    name: Crown
    sanskrit: Sahasrara
    element: Thought
    affirmation: I am connected to the divine.
    description: Pure consciousness. The gateway to higher states of awareness and universal belonging.
    character:
      name: Ukko
      title: The Sky God
      description: Supreme deity of the Finnish pantheon. He does not act within the story, he is the order above it.

  eye:
    name: Third Eye
    sanskrit: Ajna
    element: Light
    affirmation: I trust my intuition.
    description: The seat of intuition, perception, and inner knowing beyond the visible world.
    character:
      name: Louhi
      title: Mistress of Pohjola
      description: Shapeshifter and strategist of the dark north. She sees through every plan before it is spoken.

  throat:
    name: Throat
    sanskrit: Vishuddha
    element: Ether
    affirmation: I speak my truth with clarity.
    description: The center of communication, authentic self-expression, and honest speech.
    character:
      name: Väinämöinen
      title: The Primordial Singer
      description: His voice does not describe reality, it creates it. The kantele stills storms and moves mountains.

  heart:
    name: Heart
    sanskrit: Anahata
    element: Air
    affirmation: I give and receive love freely.
    description: The bridge between body and spirit. Love, compassion, and the capacity to heal.
    character:
      name: Mielikki
      title: Goddess of the Forest
      description: Healer of the woodland, wife of Tapio. She asks only for sincerity in return for her grace.

  solar:
    name: Solar Plexus
    sanskrit: Manipura
    element: Fire
    affirmation: I am confident in my power.
    description: The core of identity, personal will, and the fire that drives transformation.
    character:
      name: Ilmarinen
      title: The Eternal Smith
      description: Forger of the Sampo and the sky dome. He does not ask, he makes. Will through fire.

  sacral:
    name: Sacral
    sanskrit: Svadhisthana
    element: Water
    affirmation: I embrace life with pleasure and creativity.
    description: The seat of creativity, emotion, and the fluid energy of desire and joy.
    character:
      name: Lemminkäinen
      title: The Reckless Lover
      description: Driven by passion, dies in the river of Tuonela, resurrected by love. Water runs through his whole arc.

  root:
    name: Root
    sanskrit: Muladhara
    element: Earth
    affirmation: I am grounded and secure.
    description: The foundation of your being. Stability, safety, and a deep sense of belonging.
    character:
      name: Tapio
      title: Lord of the Forest
      description: Ancient guardian of the deep woods. He holds everything up without a narrative arc, as the earth itself does.

