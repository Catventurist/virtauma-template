water:
  quotes:
    - text: Water is the eldest of healers, the firstborn of the world.
      source: Kalevala, Rune III
    - text: The lake does not boast of its depth.
      source: Finnish proverb
    - text: Väinämöinen sang the waters still, and all the fish came to listen.
      source: Kalevala, Rune VIII
    - text: The sea remembers everything cast into it.
      source: Finnish proverb
    - text: From water came all life, to water all life returns.
      source: Kalevala, Rune I
    - text: Water does not age, fire does not lose its strength.
      source: Finnish proverb
    - text: Still waters run deep.
      source: Finnish saying
    - text: The river carves the stone not by force, but by persistence.
      source: Finnish proverb
    - text: Even the mightiest river begins as a single drop.
      source: Finnish proverb
    - text: The ice does not ask permission before it breaks.
      source: Finnish saying
    - text: Louhi held the sun captive, but she could not stop the thaw.
      source: Kalevala, Rune XLIX
    - text: The sea has no door, the wind has no leash.
      source: Finnish proverb
    - text: A boat does not choose its river.
      source: Finnish saying
    - text: He who rows gently reaches the shore.
      source: Finnish proverb
    - text: Aino walked into the water and became the wave.
      source: Kalevala, Rune IV
    - text: The well does not know thirst.
      source: Finnish proverb
    - text: Snow remembers nothing, yet it covers everything.
      source: Finnish saying
    - text: The fog lifts, but the lake remains.
      source: Finnish proverb
    - text: Vellamo rules the deep, and the deep keeps its secrets.
      source: Kalevala, Rune II
    - text: A calm lake reflects the sky most clearly.
      source: Finnish proverb

