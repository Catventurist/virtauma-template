  eye:
    name: Kolmas silmä
    sanskrit: Ajna
    element: Valo
    affirmation: Luotan intuitioonani.
    description: Intuition, havainnoinnin ja näkyvän maailman tuolle puolen ulottuvan tietämisen pesäpaikka.
