    name: Sydän
    sanskrit: Anahata
    element: Ilma
    affirmation: Annan ja vastaanotan rakkautta vapaasti.
    description: Silta kehon ja hengen välillä. Rakkaus, myötätunto ja kyky parantua.
    character:
