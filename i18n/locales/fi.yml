    name: Kurkku
    sanskrit: Vishuddha
    element: Eetteri
    affirmation: Puhun totuuteni selkeästi.
    description: Viestinnän, aidon itseilmaisun ja rehellisen puheen keskus.
    character:
      name: Väinämöinen
      title: Alkuperäinen laulaja
      description: Hänen äänensä ei kuvaile todellisuutta, se luo sen. Kanteleen soitto tyynentää myrskyt ja liikuttaa vuoria.

