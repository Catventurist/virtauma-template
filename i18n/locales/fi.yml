features:
  headline: Miksi Suomi
  title: Luonto tekee työn
  description: Vuosisatojen koskematon erämaa on tuottanut jotain, mitä nykymaailma harvoin löytää, aitoa puhtautta.
  purity:
    title: Puhdas vesi
    description: Peräisin järvistä, jotka ovat suodattuneet muinaisen kallioperän läpi tuhansien vuosien ajan.
  cold:
    title: Arktinen kylmyys
    description: Säilytetty luonnollisesti Suomen pitkillä talvilla ja pakkasten avulla.
  nature:
    title: Elävä metsä
    description: Ympäröity miljoonilla hehtaareilla koivua ja mäntyä, kaukana teollisuudesta.
  air:
    title: Puhdas ilma
    description: Suomi sijoittuu jatkuvasti maailman puhtaimman ilman maiden joukkoon.

about:
  forwhom:
    headline: Kenelle se on tarkoitettu
    title: Rakennettu yhteisöille, jotka kantavat asioita
    description: Virtauma ei ole yksilöille tehtävien hallintaan. Se on ryhmille, joissa tieto elää ihmisten välissä, ei heissä.
    distributed:
      title: Hajautetut yhteisöt
      description: Ryhmät, jotka työskentelevät eri aikavyöhykkeillä, konteksteissa ja rooleissa. Kenelläkään ei ole koko kuvaa. Virtauma antaa yhteisölle näkyvyyden siihen, mitä kannetaan ja kenen toimesta.
    longterm:
      title: Pitkäaikaiset kollektiivit
      description: Yhteisöt, jotka ovat työskennelleet yhdessä vuosia ja jatkavat edelleen. Syvä muisti on tärkeää. Pohja pitää sen, mitä yhteisö on kantanut ennen.
    network:
      title: Monisolmuiset organisaatiot
      description: Organisaatiot, joissa on useita haaroja, joista jokainen työskentelee jonkin tietyn asian parissa, kaikki virtaavat samasta lähteestä. Koordinointi ilman keskittämistä.
    evaporation:
      title: Kaikki, jotka ovat katsoneet asioiden haihtuvan
      description: Jos yhteisösi on menettänyt tärkeää tietoa vain siksi, että kukaan ei nostanut sitä, tiedät miltä haihtumassa tuntuu. Virtauma tekee sen näkyväksi ennen kuin se on poissa.
      
