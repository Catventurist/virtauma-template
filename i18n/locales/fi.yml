    name: Aurinkopunos
    sanskrit: Manipura
    element: Tuli
    affirmation: Luotan omaan voimaani.
    description: Identiteetin, tahdonvoiman ja muutosta ohjaavan tulen ydin.
    character:
      name: Ilmarinen
      title: Ikuinen seppä
      description: Sammon ja taivaankannen takoja. Hän ei pyydä, hän tekee. Tahto tulen kautta.

  sacral:
    name: Sakraali
    sanskrit: Svadhisthana
    element: Vesi
    affirmation: Omaksun elämän ilolla ja luovuudella.
    description: Luovuuden, tunnon ja halun ja ilon virtaavan energian kotipaikka.
    character:
      name: Lemminkäinen
      title: Uhkarohkea rakastaja
      description: Intohimon ajama, kuolee Tuonelan joessa, herätetään rakkauden voimalla. Vesi virtaa koko hänen tarinassaan.

  root:
    name: Juuri
    sanskrit: Muladhara
    element: Maa
    affirmation: Olen maadoitettu ja turvassa.
    description: Olemisesi perusta. Vakaus, turvallisuus ja syvä kuulumisen tunne.
    character:
      name: Tapio
      title: Metsän haltija
      description: Syvän metsän ikivanha vartija. Hän kantaa kaiken ilman tarinan kaarta, kuten maa itse tekee.

