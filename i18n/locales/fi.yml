water:
  quotes:
    - text: Vesi on vanhin voitehista, haltiatar aaltojen.
      source: Kalevala, Runo III
    - text: Järvi ei kehuskele syvyydellään.
      source: Suomalainen sananlasku
    - text: Väinämöinen lauloi vedet hiljaisiksi, ja kalat tulivat kuuntelemaan.
      source: Kalevala, Runo VIII
    - text: Meri muistaa kaiken, mitä siihen on heitetty.
      source: Suomalainen sananlasku
    - text: Vedestä tuli kaikki elämä, veteen kaikki elämä palaa.
      source: Kalevala, Runo I
    - text: Ei vesi vanhene, ei tuli voimansa menetä.
      source: Suomalainen sananlasku
    - text: Seisova vesi on syvää.
      source: Suomalainen sananlasku
    - text: Joki ei vuolla kiveä voimalla, vaan sinnikkyydellä.
      source: Suomalainen sananlasku
    - text: Suurinkin joki alkaa yksittäisestä pisarasta.
      source: Suomalainen sananlasku
    - text: Jää ei kysy lupaa ennen kuin murtuu.
      source: Suomalainen sananlasku
    - text: Louhi vangitsi auringon, mutta sulaa hän ei voinut pysäyttää.
      source: Kalevala, Runo XLIX
    - text: Merellä ei ole ovea, tuulella ei ole hihnaa.
      source: Suomalainen sananlasku
    - text: Vene ei valitse jokiaan.
      source: Suomalainen sananlasku
    - text: Hiljaa soutaen rannalle pääsee.
      source: Suomalainen sananlasku
    - text: Aino astui veteen ja muuttui aalloksi.
      source: Kalevala, Runo IV
    - text: Kaivo ei tiedä janosta.
      source: Suomalainen sananlasku
    - text: Lumi ei muista mitään, mutta peittää kaiken.
      source: Suomalainen sananlasku
    - text: Sumu nousee, mutta järvi jää.
      source: Suomalainen sananlasku
    - text: Vellamo hallitsee syvyyttä, ja syvyys pitää salaisuutensa.
      source: Kalevala, Runo II
    - text: Tyyni järvi heijastaa taivaan selvimmin.
      source: Suomalainen sananlasku

